id: pr_smoke_pipeline
name: PR smoke pipeline
suite: pr
kind: pipeline
tags:
  - pr
  - postgres
  - native
  - insert
connectors:
  - kind: source
    plugin: postgres
  - kind: destination
    plugin: postgres
workload:
  family: narrow_append
  rows: 1000
execution:
  iterations: 3
  warmups: 1
environment:
  ref: local-dev-postgres
  stream_name: bench_events
connector_options:
  source:
    sync_mode: full_refresh
  destination:
    load_method: insert
    write_mode: append
assertions:
  expected_records_read: 1000
  expected_records_written: 1000
